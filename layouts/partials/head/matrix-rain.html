<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Matrix Rain effect using Three.js
(function () {
  'use strict';

  const CONFIG = {
    fontSize: 20,
    count: 0,
    speed: 0.08,
    colorDark: 0x00ff41,
    colorLight: 0x6b21a8,
  };

  let scene, camera, renderer;
  let positions, velocities, characters, charLengths;
  let pointCloud;
  let canvas, ctxTexture;
  let width, height;

  function getThemeColor() {
    const theme = document.documentElement.getAttribute('data-theme');
    return theme === 'light' ? CONFIG.colorLight : CONFIG.colorDark;
  }

  function generateTexture() {
    canvas = document.createElement('canvas');
    canvas.width = 64;
    canvas.height = 64;
    ctxTexture = canvas.getContext('2d');
    ctxTexture.font = 'Bold 48px monospace';
    ctxTexture.textAlign = 'center';
    ctxTexture.textBaseline = 'middle';
    ctxTexture.fillStyle = '#ffffff';
    ctxTexture.fillText('1', 32, 32);
    return new THREE.CanvasTexture(canvas);
  }

  function init() {
    width = window.innerWidth;
    height = window.innerHeight;

    // Scene
    scene = new THREE.Scene();

    // Camera
    camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
    camera.position.z = 1;

    // Renderer
    renderer = new THREE.WebGLRenderer({
      alpha: true,
      antialias: false,
    });
    renderer.setSize(width, height);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1));
    renderer.domElement.style.position = 'fixed';
    renderer.domElement.style.top = '0';
    renderer.domElement.style.left = '0';
    renderer.domElement.style.width = '100vw';
    renderer.domElement.style.height = '100vh';
    renderer.domElement.style.zIndex = '-1';
    renderer.domElement.style.pointerEvents = 'none';
    renderer.domElement.id = 'matrix-rain-three';
    document.body.prepend(renderer.domElement);

    // Create character texture
    const texture = generateTexture();

    // Determine number of columns and rows
    const cols = Math.floor(width / CONFIG.fontSize);
    const rows = Math.floor(height / CONFIG.fontSize) + 10;
    CONFIG.count = cols;
    const total = cols * rows;

    // Geometry
    const geometry = new THREE.BufferGeometry();
    positions = new Float32Array(total * 3);
    velocities = new Float32Array(cols);
    characters = new Float32Array(total);
    charLengths = rows;

    // Initialize
    for (let i = 0; i < cols; i++) {
      velocities[i] = Math.random() * 0.1 + 0.02;
      for (let j = 0; j < rows; j++) {
        const idx = i * rows + j;
        positions[idx * 3] = (i / cols) * 2 - 1;
        positions[idx * 3 + 1] = 1 - (j / rows) * 2;
        positions[idx * 3 + 2] = 0;
        characters[idx] = Math.random();
      }
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    // Material
    const material = new THREE.PointsMaterial({
      size: CONFIG.fontSize / Math.min(width, height) * 2,
      map: texture,
      transparent: true,
      opacity: 0.6,
      color: getThemeColor(),
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      sizeAttenuation: false,
    });

    pointCloud = new THREE.Points(geometry, material);
    scene.add(pointCloud);

    window.addEventListener('resize', onResize);
    animate();
  }

  function updateTextureChar(char) {
    ctxTexture.clearRect(0, 0, 64, 64);
    ctxTexture.fillStyle = '#ffffff';
    ctxTexture.fillText(char, 32, 32);
    pointCloud.material.map.needsUpdate = true;
  }

  function animate() {
    requestAnimationFrame(animate);

    // ─── Matrix Rain Update ───
    const positionsAttr = pointCloud.geometry.attributes.position;
    const pos = positionsAttr.array;
    const cols = CONFIG.count;
    const rows = charLengths;
    const heightPx = window.innerHeight;

    for (let i = 0; i < cols; i++) {
      // Move each column down
      const offset = velocities[i] * CONFIG.speed;
      for (let j = rows - 1; j >= 0; j--) {
        const idx = i * rows + j;
        // Shift char down: copy from above
        if (j > 0) {
          const aboveIdx = i * rows + (j - 1);
          pos[idx * 3 + 1] = pos[aboveIdx * 3 + 1] - offset;
          characters[idx] = characters[aboveIdx];
        } else {
          // Top of column - wrap around
          pos[idx * 3 + 1] = pos[(i * rows + (rows - 1)) * 3 + 1] + offset;
          characters[idx] = Math.random();
        }
      }

      // If whole column is off-screen, randomize a bit
      const bottomIdx = i * rows + (rows - 1);
      if (pos[bottomIdx * 3 + 1] < -1) {
        const resetY = 1 + Math.random() * 2;
        for (let j = 0; j < rows; j++) {
          const idx = i * rows + j;
          pos[idx * 3 + 1] = resetY - (j / rows) * 3;
        }
        velocities[i] = Math.random() * 0.1 + 0.02;
      }
    }

    positionsAttr.needsUpdate = true;
    renderer.render(scene, camera);
  }

  function onResize() {
    width = window.innerWidth;
    height = window.innerHeight;
    renderer.setSize(width, height);
  }

  // Watch for theme changes
  const observer = new MutationObserver(() => {
    if (pointCloud) {
      pointCloud.material.color.setHex(getThemeColor());
    }
  });
  observer.observe(document.documentElement, {
    attributes: true,
    attributeFilter: ['data-theme'],
  });

  // Start when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
